<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BBW Warehouse — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/core.js"></script>
<style>
  :root {
    --bg: #0d0f12;
    --surface: #161a1f;
    --border: #252b33;
    --gold: #c9a84c;
    --gold-dim: #7a6030;
    --text: #e8e4dc;
    --muted: #6b7280;
    --danger: #e05252;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .logo-zone {
    background: #fff;
    border-radius: 8px;
    padding: 10px 20px;
    margin-bottom: 8px;
    display: inline-block;
  }
  .logo-zone img { height: 40px; display: block; }
  .tagline { color: var(--muted); font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 32px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
    width: 100%;
    max-width: 360px;
  }
  .card h2 { font-size: 1rem; color: var(--gold); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 20px; }

  /* Name selector */
  .name-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
    max-height: 160px;
    overflow-y: auto;
  }
  .name-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .name-btn:hover, .name-btn.selected {
    background: var(--gold);
    color: #000;
    border-color: var(--gold);
    font-weight: 600;
  }

  /* PIN display */
  .pin-display {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .pin-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--gold-dim);
    transition: all 0.15s;
  }
  .pin-dot.filled { background: var(--gold); border-color: var(--gold); }

  /* Keypad */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .key {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 14px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.1s;
    user-select: none;
  }
  .key:active, .key:hover { background: var(--gold); color: #000; border-color: var(--gold); }
  .key.del { color: var(--danger); }
  .key.enter { grid-column: span 3; background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; letter-spacing: 0.06em; }
  .key.enter:hover { background: #e8c55a; }

  /* PIN alpha input (for admin password which may have letters) */
  .pin-alpha {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
    padding: 12px 14px;
    letter-spacing: 0.15em;
    margin-bottom: 16px;
    text-align: center;
    outline: none;
  }
  .pin-alpha:focus { border-color: var(--gold); }

  .err { color: var(--danger); font-size: 0.82rem; text-align: center; min-height: 20px; margin-bottom: 4px; }
  .step-label { font-size: 0.75rem; color: var(--muted); text-align: center; margin-bottom: 8px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 8px;
    font-size: 0.85rem; opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.toast-error { border-color: var(--danger); color: var(--danger); }
  .toast.toast-success { border-color: var(--gold); color: var(--gold); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="logo-zone">
  <img src="assets/logo-black.png" alt="BBW" onerror="this.style.display='none';this.parentNode.innerHTML='<span style=font-size:1.2rem;font-weight:800;color:#000>BBW</span>'">
</div>
<div class="tagline">Warehouse Management</div>

<div class="card">
  <h2 id="step-title">Select Your Name</h2>

  <!-- Step 1: Name selection -->
  <div id="step-name">
    <div class="name-list" id="name-list"></div>
    <div class="err" id="err-name"></div>
    <button class="key enter" onclick="goToPin()" style="width:100%;border-radius:8px;padding:14px;font-size:1rem;cursor:pointer">Next →</button>
  </div>

  <!-- Step 2: PIN / Password -->
  <div id="step-pin" class="hidden">
    <p class="step-label" id="pin-label">Enter your PIN</p>

    <!-- Numeric keypad (for stager/supervisor/manager) -->
    <div id="numeric-entry">
      <div class="pin-display" id="pin-dots"></div>
      <div class="keypad">
        <div class="key" onclick="kp('1')">1</div><div class="key" onclick="kp('2')">2</div><div class="key" onclick="kp('3')">3</div>
        <div class="key" onclick="kp('4')">4</div><div class="key" onclick="kp('5')">5</div><div class="key" onclick="kp('6')">6</div>
        <div class="key" onclick="kp('7')">7</div><div class="key" onclick="kp('8')">8</div><div class="key" onclick="kp('9')">9</div>
        <div class="key del" onclick="kp('del')">⌫</div><div class="key" onclick="kp('0')">0</div><div class="key" onclick="kp('clear')">✕</div>
        <div class="key enter" onclick="doLogin()">Login</div>
      </div>
    </div>

    <!-- Alpha input (admin) -->
    <div id="alpha-entry" class="hidden">
      <input type="password" class="pin-alpha" id="alpha-input" placeholder="Password" maxlength="32" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <div class="err" id="err-pin"></div>
    <button class="key" onclick="backToName()" style="width:100%;border-radius:8px;padding:10px;font-size:0.85rem;cursor:pointer;margin-top:4px">← Back</button>
  </div>
</div>

<script>
let selectedUser = null;
let pinBuffer = '';

function renderNames() {
  const users = getUsers();
  const list = document.getElementById('name-list');
  list.innerHTML = '';
  users.forEach(u => {
    const b = document.createElement('button');
    b.className = 'name-btn';
    b.textContent = u.name;
    b.onclick = () => {
      document.querySelectorAll('.name-btn').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
      selectedUser = u;
      document.getElementById('err-name').textContent = '';
    };
    list.appendChild(b);
  });
}

function goToPin() {
  if (!selectedUser) { document.getElementById('err-name').textContent = 'Select a name first'; return; }
  document.getElementById('step-name').classList.add('hidden');
  document.getElementById('step-pin').classList.remove('hidden');
  document.getElementById('step-title').textContent = `Welcome, ${selectedUser.name.split(' ')[0]}`;
  document.getElementById('pin-label').textContent = selectedUser.role === 'admin' ? 'Enter your password' : 'Enter your PIN';

  if (selectedUser.role === 'admin') {
    document.getElementById('numeric-entry').classList.add('hidden');
    document.getElementById('alpha-entry').classList.remove('hidden');
    setTimeout(() => document.getElementById('alpha-input').focus(), 100);
  } else {
    document.getElementById('numeric-entry').classList.remove('hidden');
    document.getElementById('alpha-entry').classList.add('hidden');
  }
  pinBuffer = '';
  renderDots();
}

function backToName() {
  document.getElementById('step-pin').classList.add('hidden');
  document.getElementById('step-name').classList.remove('hidden');
  document.getElementById('step-title').textContent = 'Select Your Name';
  document.getElementById('err-pin').textContent = '';
  pinBuffer = '';
}

function kp(v) {
  if (v === 'del') { pinBuffer = pinBuffer.slice(0, -1); }
  else if (v === 'clear') { pinBuffer = ''; }
  else if (pinBuffer.length < 8) { pinBuffer += v; }
  renderDots();
  document.getElementById('err-pin').textContent = '';
}

function renderDots() {
  const c = document.getElementById('pin-dots');
  c.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const d = document.createElement('div');
    d.className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
    c.appendChild(d);
  }
}

function doLogin() {
  const users = getUsers();
  const u = users.find(x => x.id === selectedUser.id);
  if (!u) { document.getElementById('err-pin').textContent = 'User not found'; return; }

  const entered = selectedUser.role === 'admin'
    ? document.getElementById('alpha-input').value
    : pinBuffer;

  if (entered !== u.pin) {
    document.getElementById('err-pin').textContent = 'Incorrect PIN / password';
    pinBuffer = '';
    renderDots();
    if (selectedUser.role === 'admin') document.getElementById('alpha-input').value = '';
    return;
  }

  setSession({ id: u.id, name: u.name, role: u.role });

  if (u.role === 'admin') window.location.href = 'pages/admin.html';
  else window.location.href = 'pages/app.html';
}

renderNames();
renderDots();

// Check already logged in
const sess = getSession();
if (sess) {
  if (sess.role === 'admin') window.location.href = 'pages/admin.html';
  else window.location.href = 'pages/app.html';
}
</script>
</body>
</html>
